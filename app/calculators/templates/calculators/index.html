{% extends "website/base.html" %}

{% block content %}
{% include "website/partials/_page_hero.html" with title="Financial Calculators" breadcrumb=True %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
  <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
    {% for calc in calculators %}
    <div class="bg-white border border-border rounded-xl p-6 hover:-translate-y-1 transition-transform duration-200 group"
         data-category="{{ calc.category }}">
      <span class="text-xs uppercase tracking-wider text-gold font-medium">{{ calc.category|title }}</span>
      <h3 class="font-serif text-navy font-semibold text-lg mt-1 mb-2">{{ calc.title }}</h3>
      <p class="text-muted text-sm mb-4">{{ calc.description }}</p>
      <a href="{% url 'calculators:calculator_detail' calc.slug %}"
         class="text-gold text-sm font-medium flex items-center gap-1 hover:gap-2 transition-all">
        Open Calculator &rarr;
      </a>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
