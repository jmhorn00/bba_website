{% extends "website/base.html" %}

{% block title %}Payment Cancelled — BBA CPAs{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-24 text-center">

  <!-- Icon -->
  <div class="w-20 h-20 bg-yellow-50 rounded-full flex items-center justify-center mx-auto mb-6">
    <svg class="w-10 h-10 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
    </svg>
  </div>

  <div class="w-12 h-0.5 bg-gold mx-auto mb-6"></div>
  <h1 class="font-serif text-4xl text-navy font-bold mb-3">Payment Cancelled</h1>
  <p class="text-muted text-lg mb-4">Your payment was not processed.</p>
  <p class="text-muted mb-10">You have not been charged. If you experienced an issue or need help, please contact our office.</p>

  <div class="flex flex-wrap gap-4 justify-center">
    <a href="/pay/" class="bg-navy text-white px-6 py-3 rounded font-medium hover:bg-navy/90 transition-colors">
      Try Again
    </a>
    <a href="/contact/" class="border border-navy text-navy px-6 py-3 rounded font-medium hover:bg-navy hover:text-white transition-colors">
      Contact Us
    </a>
  </div>
</div>
{% endblock %}
